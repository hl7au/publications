name: Publications Infra (Terraform)

# Manages the publications serving infrastructure (CloudFront distribution + function,
# S3 content-bucket settings) under terraform/cloudfront/.
#   - PR touching terraform/**      -> fmt/validate/plan (review before merge)
#   - push to master touching same  -> apply
#   - manual dispatch               -> plan or apply on demand
#
# REQUIRES the remote S3 backend to be configured (see terraform/cloudfront/README.md
# "Remote state"): the dedicated state bucket must exist and the backend block in
# versions.tf must be uncommented, or `terraform init` here will not find shared state.

on:
  pull_request:
    paths: ["terraform/**"]
  push:
    branches: [master]
    paths: ["terraform/**"]
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        type: choice
        default: plan
        options: [plan, apply]

permissions:
  id-token: write   # OIDC
  contents: read
  pull-requests: write

concurrency:
  group: publications-infra
  cancel-in-progress: false

defaults:
  run:
    working-directory: terraform/cloudfront

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::966489602583:role/ghactions_publications_oidc
          aws-region: ap-southeast-2

      - name: Read pinned Terraform version
        id: tfver
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.tfver.outputs.version }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: |
          terraform plan -input=false -no-color -lock-timeout=120s | tee plan.txt
          {
            echo "### Terraform plan"
            echo '```'
            tail -c 60000 plan.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Terraform apply
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
          (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')
        run: terraform apply -input=false -no-color -auto-approve -lock-timeout=120s
