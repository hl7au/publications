name: IG build → preprod (on GitHub release) — reusable

# CENTRALIZED, reusable (workflow_call) pipeline for the AU FHIR IGs. ONE source of truth lives here
# in hl7au/publications; each IG repo (au-fhir-base, au-fhir-ps, au-fhir-core) carries only a thin
# caller stub that forwards its push/PR/release/dispatch events to this workflow.
#
# WHAT IT DOES: renders the IG ONCE (publication mode), then runs go-publish TWICE off that single
# render (-reuse-build → the 2nd is ~100s, not another render) to produce BOTH a WORKING and a
# MILESTONE build, packaged as one reviewable .zip artifact. Then:
#   - DEVELOPER PREVIEW is HL7 International's CI build (build.fhir.org/ig/<org>/<repo>/branches/<branch>),
#     driven by HL7's own auto-builder — NOT this pipeline. We just link to it + attach the .zip.
#     (Our own S3 preview is retained but OFF by default — set enable_s3_preview=true to re-enable it
#      when we specifically need to validate our own pipeline/publisher output.)
#   - On a GitHub RELEASE (published) → deploy to PREPROD (preprod.hl7.org.au) for staging validation.
#     A release targets the publication/release BRANCH (which is never merged to master); the release is
#     the staging act. Mode (milestone vs working) is AUTO-DETECTED from publication-request.json
#     `status` (the FHIR-standard signal): release/trial-use/normative/normative+trial-use → milestone
#     (becomes the candidate 'current'); draft/ballot/preview/update/ci-build → working (versioned
#     snapshot, not current). Ungated — preprod is staging.
#   - PROD is NOT published from here. Promotion to prod (hl7.org.au) is a SEPARATE, manual step that
#     copies the APPROVED preprod content to prod, run from THIS repo (publications) so HL7 AU controls
#     who can release: .github/workflows/promote-prod.yml (aws s3 sync preprod → prod, scoped to the
#     released IG, gated by a per-IG publications `production-<ig>` env). See docs/publication-process.md.
# github.* context inside this workflow reflects the CALLER's triggering event.
#
# QUALITY GATE (QA regression gate): every build summarises the render's QA (ig-src/output/qa.txt) to
# the run summary. On a PR it compares the error count against the base branch's last recorded count
# (a tiny cached count file, saved on branch pushes, restored keyed by base branch — so both sides are
# the same pipeline + same jar) and FAILS the build if the branch ADDS errors, then upserts a QA comment
# on the PR. No per-IG threshold to maintain; the baseline is the base branch itself. Needs the caller
# stub to grant `pull-requests: write` for the comment (the summary + gate work regardless).
#
# PER-IG PARAMETER — `subtree`:
#   - ""          → this IG owns the /fhir ROOT (au-base). Syncs out/<mode>/fhir → s3://<bucket>/fhir.
#   - "ps"/"core" → this IG owns only /fhir/<subtree>. Syncs that subtree, PLUS the SHARED root files
#                   it read-modify-wrote (the /fhir feeds + the web-root package-registry.json),
#                   uploaded INDIVIDUALLY — never a blanket /fhir sync (that would clobber the root
#                   owner's history.html / package-list.json / index.html).
#   Shared root files are seeded from the LIVE prod copies, so go-publish inserts this IG's entry and
#   the sibling IGs' entries survive. All uploads are additive — never --delete.
#
# DEPLOY TARGETS:
#   - build.fhir.org (HL7 CI): developer previews — external, not written by us.
#   - preprod (hl7au-fhir-ig-mirror / preprod.hl7.org.au): deploy on a GitHub release (or dispatch with
#     deploy_preprod=true for on-demand branch staging). Ungated — preprod is staging.
#   - prod (hl7au-fhir-ig / hl7.org.au): NOT written here. Promoted manually from preprod via
#     publications/.github/workflows/promote-prod.yml (gated by a per-IG publications `production-<ig>` env).
#   - previews S3 (hl7au-fhir-ig-previews / previews.hl7.org.au): retained but OFF by default
#     (enable_s3_preview=true to re-enable our own preview channel).
#
# TEMP: fetches the combined custom publisher.jar (KyleOps/fhir-ig-publisher release au-pipeline-combined:
# #1327 cloud redirects + A2 dynamic publish-box/page-versions + skip-version-tree + A3 source viewers +
# lever C -reuse-build) until those changes ship upstream — then revert to ./_updatePublisher.sh -f -y.

on:
  workflow_call:
    inputs:
      subtree:
        description: 'IG path under /fhir. "" = owns the /fhir root (au-base); "ps"/"core" = subtree owner.'
        type: string
        required: false
        default: ""
      ref:
        description: "Tag/branch of the IG repo to build (dispatch only; empty = the triggering commit)."
        type: string
        required: false
        default: ""
      deploy_preprod:
        description: "Deploy this build to PREPROD (preprod.hl7.org.au). A GitHub release deploys automatically; set this for on-demand branch staging behind the real CloudFront setup."
        type: boolean
        default: false
      enable_s3_preview:
        description: "Also deploy our own S3 preview channel (previews.hl7.org.au). Off by default — build.fhir.org is the dev preview."
        type: boolean
        default: false

permissions:
  id-token: write        # OIDC → AWS (preprod deploy + optional S3 preview)
  contents: read
  pull-requests: write   # QA gate: comment the QA summary on the triggering PR (needs the caller stub to grant it too)

concurrency:
  group: ig-publish-${{ github.repository }}   # serialise each IG against itself; siblings independent
  cancel-in-progress: false

env:
  PUBLISHER_JAR_URL: https://github.com/KyleOps/fhir-ig-publisher/releases/download/au-pipeline-combined/publisher.jar
  PUBLICATIONS_REPO: hl7au/publications          # publish-setup.json + templates/ (config on master)
  PUBLICATIONS_REF: master
  TX_SERVER: https://tx.fhir.org
  PROD_BUCKET: hl7au-fhir-ig
  PREPROD_BUCKET: hl7au-fhir-ig-mirror
  PREVIEWS_BUCKET: hl7au-fhir-ig-previews
  PROD_DIST: E2U6NB1JDLY5NT
  PREPROD_DIST: E1U9JOMOLLTC27
  AWS_ROLE: arn:aws:iam::966489602583:role/ghactions_publications_oidc
  AWS_REGION: ap-southeast-2

jobs:
  build:
    runs-on: ubuntu-latest
    container: hl7fhir/ig-publisher-base
    outputs:
      slug: ${{ steps.meta.outputs.slug }}
      ver: ${{ steps.render.outputs.ver }}
      own: ${{ steps.meta.outputs.own }}
      status: ${{ steps.detect.outputs.status }}
      version: ${{ steps.detect.outputs.version }}
      pubmode: ${{ steps.detect.outputs.pubmode }}
      tag_version_ok: ${{ steps.detect.outputs.tag_version_ok }}
    steps:
      - name: Compute build label (branch / pr-N / tag / dispatch ref) + owned path
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            slug="pr-${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            slug="${{ inputs.ref }}"
          else
            slug="${{ github.ref_name }}"
          fi
          slug=$(echo "$slug" | tr '/' '-' | tr -cd 'A-Za-z0-9._-')
          echo "slug=$slug" >> "$GITHUB_OUTPUT"
          own="fhir"; [ -n "${{ inputs.subtree }}" ] && own="fhir/${{ inputs.subtree }}"
          echo "own=$own" >> "$GITHUB_OUTPUT"
          echo "Build label: $slug · owned path: /$own"

      - name: Checkout IG source (the calling repo)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
          path: ig-src

      # Auto-detect milestone vs working from the FHIR-standard `status` in publication-request.json
      # (NOT the version number — AU history shows clean versions like 2.0.0 shipped as `preview` and
      # 1.0.0 as `ballot`; the versions that became 'current' were all `trial-use`). The publisher's
      # `mode` (working/milestone) and `status` are independent; here `status` drives the choice:
      #   release | trial-use | normative | normative+trial-use → MILESTONE (candidate 'current')
      #   draft | ballot | preview | update | ci-build | (other) → WORKING (versioned, not current)
      # tag_version_ok: on a GitHub release (its ref is the tag), the tag (minus its release-/v prefix)
      # must equal the publication-request version. Preprod is staging so this does NOT block; it's
      # surfaced in the report as a guard against staging the wrong commit (e.g. a release tagged
      # v6.1.0 on a commit whose publication-request says 6.0.2) BEFORE it is promoted to prod.
      - name: Detect publication mode (status-driven)
        id: detect
        working-directory: ig-src
        run: |
          status=$(node -e 'const fs=require("fs");try{process.stdout.write((JSON.parse(fs.readFileSync("publication-request.json","utf8")).status||"").toLowerCase())}catch(e){}')
          version=$(node -e 'const fs=require("fs");try{process.stdout.write(JSON.parse(fs.readFileSync("publication-request.json","utf8")).version||"")}catch(e){}')
          case "$status" in
            release|trial-use|normative|normative+trial-use) pubmode=milestone ;;
            *) pubmode=working ;;
          esac
          tagok=false; tagnorm=""
          if [ "${{ github.ref_type }}" = "tag" ]; then
            tagnorm="${{ github.ref_name }}"; tagnorm="${tagnorm#release-}"; tagnorm="${tagnorm#v}"
            [ -n "$version" ] && [ "$tagnorm" = "$version" ] && tagok=true
          fi
          echo "status=$status"   >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "pubmode=$pubmode" >> "$GITHUB_OUTPUT"
          echo "tag_version_ok=$tagok" >> "$GITHUB_OUTPUT"
          echo "status='$status' version='$version' → pubmode=$pubmode (tag-match=$tagok)"

      - name: Checkout publish-setup.json + templates (sparse, from publications)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PUBLICATIONS_REPO }}
          ref: ${{ env.PUBLICATIONS_REF }}
          path: publications
          sparse-checkout: |
            publish-setup.json
            templates
          sparse-checkout-cone-mode: false

      - name: Checkout history template (go-publish -history)
        uses: actions/checkout@v4
        with: { repository: HL7/fhir-ig-history-template, path: fhir-history }

      - name: Checkout IG registry (go-publish -registry)
        uses: actions/checkout@v4
        with: { repository: hl7au/ig-registry, path: ig-registry }

      # TEMP: until the opt-in publisher changes merge upstream and ship in a release, use the combined
      # jar (KyleOps release). It lives behind a MUTABLE tag, so the cache key is the asset's ETag,
      # resolved AFTER following the release redirect (-L) — when KyleOps re-publishes the tag the ETag
      # changes and the cache refreshes automatically. If the ETag can't be resolved we skip the cache
      # and just download (no stale-jar trap). Revert to `./_updatePublisher.sh -f -y` once upstream ships.
      - name: Resolve combined publisher.jar ETag (cache key)
        id: jarver
        run: |
          etag=$(curl -sSIL "$PUBLISHER_JAR_URL" | tr -d '\r' | awk 'tolower($1)=="etag:"{print $2}' | tail -1 | tr -d '"')
          echo "etag=${etag:-none}" >> "$GITHUB_OUTPUT"
          echo "combined publisher.jar ETag: ${etag:-none}"
      - name: Cache combined publisher.jar (keyed on its ETag)
        if: steps.jarver.outputs.etag != 'none'
        uses: actions/cache@v4
        with:
          path: ig-src/input-cache/publisher.jar
          key: pubjar-${{ steps.jarver.outputs.etag }}
      - name: Download combined publisher.jar (only if not restored from cache)
        working-directory: ig-src
        run: |
          mkdir -p input-cache
          if [ -s input-cache/publisher.jar ]; then
            echo "publisher.jar restored from cache: $(du -h input-cache/publisher.jar | cut -f1)"
          else
            curl -sSL -o input-cache/publisher.jar "$PUBLISHER_JAR_URL"
            echo "publisher.jar downloaded: $(du -h input-cache/publisher.jar | cut -f1)"
          fi

      # Persist the FHIR package cache across runs so the render doesn't re-download packages each time.
      # Keyed on the IG's dependency declarations (ig.xml dependsOn + ig.ini); restore-keys falls back
      # to the latest cache and the render just adds anything new. NOTE: only the -ig render honors
      # -package-cache-folder; go-publish ignores it, but -reuse-build makes go-publish skip the render.
      # The render step also symlinks ~/.fhir/packages to this folder: several code paths hardwire the
      # DEFAULT cache location — go-publish, and the validator's ImplementationGuide.dependsOn check,
      # which builds its own FilesystemPackageCacheManager. With a cold default cache that check falls
      # through to a fuzzy npm catalog search and reports bogus canonical clashes (e.g. packageId
      # hl7.terminology.r4 "pointing to" packages2's hl7.terminology.r4b web tgz) — 5 spurious QA
      # errors on the au-core 2.1.0-draft release that build.fhir.org (warm default cache) never shows.
      - name: Cache FHIR packages (speeds up the render)
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.fhir-cache
          key: fhir-pkgcache-v1-${{ hashFiles('ig-src/input/ig.xml', 'ig-src/ig.ini') }}
          restore-keys: fhir-pkgcache-v1-

      # Persist the TERMINOLOGY cache across runs. The AU template points the publisher at
      # input-cache/txcache (path-tx-cache); there is no CLI flag for it, so we cache that folder in
      # place. Terminology validation against tx.fhir.org is the dominant phase of the build, so a warm
      # txcache removes most repeat round-trips. The run_id suffix makes every run save a fresh snapshot
      # (cache keys are immutable); restore-keys pulls the most recent prior cache to seed it.
      - name: Cache terminology cache (txcache) across runs
        uses: actions/cache@v4
        with:
          path: ig-src/input-cache/txcache
          key: txcache-v1-${{ hashFiles('ig-src/input/ig.xml', 'ig-src/ig.ini') }}-${{ github.run_id }}
          restore-keys: |
            txcache-v1-${{ hashFiles('ig-src/input/ig.xml', 'ig-src/ig.ini') }}-
            txcache-v1-

      - name: Render IG in publication mode (reused by both go-publish runs via -reuse-build, lever C)
        id: render
        working-directory: ig-src
        run: |
          # Render once, to the final publish path, so the output is publishable and BOTH go-publish
          # runs below can adopt it (no re-render). Path (not mode) drives the reuse match, so flipping
          # mode for each preview below still reuses this one render.
          mkdir -p "$GITHUB_WORKSPACE/.fhir-cache"
          # Unify the DEFAULT package-cache location with the cached folder (see the cache step note):
          # kills the spurious dependsOn canonical-clash QA errors and lets go-publish reuse the cache.
          mkdir -p "$HOME/.fhir" && rm -rf "$HOME/.fhir/packages" && ln -sfn "$GITHUB_WORKSPACE/.fhir-cache" "$HOME/.fhir/packages"
          PUBPATH=$(grep -o '"path"[^,}]*' publication-request.json | head -1 | sed 's/.*:[[:space:]]*"\([^"]*\)".*/\1/')
          echo "Publication path: $PUBPATH"
          echo "ver=${PUBPATH##*/}" >> "$GITHUB_OUTPUT"   # version folder name, for preview deep-links
          # Cross-version comparison runs on every render (the IG's version-comparison-master parameter,
          # or {last} if unset). Measured cost on the current jar: ~10s and 0 errors/warnings, so the
          # diff is available in both the working and milestone previews as a review aid. (The old belief
          # that it was slow/noisy was the stale 2.0.x jar + a stale comparison-v* output dir.)
          java -jar input-cache/publisher.jar -ig . -publish "$PUBPATH" \
            -package-cache-folder "$GITHUB_WORKSPACE/.fhir-cache" -tx "$TX_SERVER"

      # Seed a lean -web mirror (a few MB, not the 15GB tree): the OWNED path's own package-list.json
      # plus the SHARED root files go-publish read-modify-writes. Seeded from the LIVE prod copies so a
      # sibling IG's feed/registry entries survive this independent publish. See docs/build-pipeline.md.
      - name: Seed lean -web template (owned package-list + shared root files — no 15GB sync)
        run: |
          own="${{ steps.meta.outputs.own }}"
          mkdir -p "web-seed/$own"
          cp publications/publish-setup.json web-seed/publish-setup.json
          # the owned path's own package-list.json (/fhir for the root owner, /fhir/<subtree> otherwise)
          curl -sS -o "web-seed/$own/package-list.json" "https://hl7.org.au/$own/package-list.json"
          # SHARED root files (read-modify-written by go-publish) — always seeded from live prod
          curl -sS -o web-seed/fhir/package-feed.xml      https://hl7.org.au/fhir/package-feed.xml
          curl -sS -o web-seed/fhir/publication-feed.xml  https://hl7.org.au/fhir/publication-feed.xml
          curl -sS -o web-seed/package-registry.json      https://hl7.org.au/package-registry.json || true
          # publisher requires the source to NOT contain package-list.json
          rm -f ig-src/package-list.json

      # Both previews ADOPT the single render above (-reuse-build → no re-render), so each go-publish is
      # ~100s. The publication-request mode is forced per run so the previews are consistent regardless
      # of what's committed. ABSOLUTE paths required (IGReleaseRedirectionBuilder substrings the
      # web-root prefix off the version dest folder; a relative path throws StringIndexOutOfBounds).
      - name: Build WORKING preview (go-publish, mode=working, -reuse-build)
        run: |
          # Preview leniency: PR / branch-push builds may depend on #current (normal for CI content,
          # e.g. au-core master depends on hl7.fhir.au.base#current) — allow it so previews still
          # build. Tag and dispatch runs stay STRICT: their artifacts are exactly what a prod publish
          # uploads, so a release with an unpinned dependency must fail loudly here (go-publish's
          # "current version check"), forcing the release commit to pin its dependencies.
          if [ "${{ github.ref_type }}" != "tag" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then export ALLOW_CURRENT_DEPS=true; fi
          node -e 'const fs=require("fs");const p="ig-src/publication-request.json";const d=JSON.parse(fs.readFileSync(p,"utf8"));d.mode="working";if(process.env.ALLOW_CURRENT_DEPS==="true"){d["allow-current-dependencies"]=true;}fs.writeFileSync(p,JSON.stringify(d,null,2));'
          cp -a web-seed webroot-working
          java -jar "$GITHUB_WORKSPACE/ig-src/input-cache/publisher.jar" -go-publish -reuse-build \
            -source "$GITHUB_WORKSPACE/ig-src" -web "$GITHUB_WORKSPACE/webroot-working" \
            -history "$GITHUB_WORKSPACE/fhir-history" -registry "$GITHUB_WORKSPACE/ig-registry/fhir-ig-list.json" \
            -templates "$GITHUB_WORKSPACE/publications/templates" -temp "$GITHUB_WORKSPACE/temp-working" \
            -tx "$TX_SERVER"
          mkdir -p preview/working && mv webroot-working/fhir preview/working/fhir
          # package-registry.json lives at the WEB ROOT (outside fhir/). Carry it into the preview tree
          # so the publish job can upload it — it is a shared root file every IG read-modify-writes.
          [ -f webroot-working/package-registry.json ] && cp webroot-working/package-registry.json preview/working/package-registry.json || true

      - name: Build MILESTONE preview (go-publish, mode=milestone, -reuse-build)
        continue-on-error: true   # review aid — a hiccup here must not block previews or the publish
        run: |
          # Force milestone + trial-use (AU milestones are the R-numbered trial-use "current"). Same
          # publish path → -reuse-build still adopts the one render. Throwaway -web; affects nothing.
          if [ "${{ github.ref_type }}" != "tag" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then export ALLOW_CURRENT_DEPS=true; fi
          node -e 'const fs=require("fs");const p="ig-src/publication-request.json";const d=JSON.parse(fs.readFileSync(p,"utf8"));d.mode="milestone";d.status="trial-use";if(process.env.ALLOW_CURRENT_DEPS==="true"){d["allow-current-dependencies"]=true;}fs.writeFileSync(p,JSON.stringify(d,null,2));'
          cp -a web-seed webroot-milestone
          java -jar "$GITHUB_WORKSPACE/ig-src/input-cache/publisher.jar" -go-publish -reuse-build \
            -source "$GITHUB_WORKSPACE/ig-src" -web "$GITHUB_WORKSPACE/webroot-milestone" \
            -history "$GITHUB_WORKSPACE/fhir-history" -registry "$GITHUB_WORKSPACE/ig-registry/fhir-ig-list.json" \
            -templates "$GITHUB_WORKSPACE/publications/templates" -temp "$GITHUB_WORKSPACE/temp-milestone" \
            -tx "$TX_SERVER"
          mkdir -p preview/milestone && mv webroot-milestone/fhir preview/milestone/fhir
          [ -f webroot-milestone/package-registry.json ] && cp webroot-milestone/package-registry.json preview/milestone/package-registry.json || true

      - name: Package previews (working + milestone) as tar.gz
        run: |
          # No preview-only redirect added here — this same artifact feeds the publish jobs, which must
          # NOT carry a fabricated index.html. The redirect is added in the preview-s3 job only.
          tar -czf "$GITHUB_WORKSPACE/preview-${{ steps.meta.outputs.slug }}.tar.gz" -C preview .
          echo "Archived $(du -h "$GITHUB_WORKSPACE/preview-${{ steps.meta.outputs.slug }}.tar.gz" | cut -f1)"

      - name: Upload review artifact (working + milestone)
        uses: actions/upload-artifact@v4
        with:
          name: site-${{ steps.meta.outputs.slug }}
          path: preview-${{ steps.meta.outputs.slug }}.tar.gz
          retention-days: 14

      # Developer preview = HL7 International's CI build (build.fhir.org), driven by HL7's own
      # auto-builder. We don't deploy it — just surface the link + the downloadable .zip. The HL7 CI
      # build URL is /ig/<org>/<repo> for the default branch and /ig/<org>/<repo>/branches/<branch>
      # otherwise. (Tag/dispatch runs aren't branch builds, so we point at the default-branch build.)
      - name: Report build outputs (build.fhir.org preview + downloadable zip)
        run: |
          repo="${{ github.repository }}"            # e.g. hl7au/au-fhir-base
          default="${{ github.event.repository.default_branch }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then branch="${{ github.head_ref }}"; else branch="${{ github.ref_name }}"; fi
          base="https://build.fhir.org/ig/$repo"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            url="$base"                              # tag build → default-branch CI build
          elif [ -n "$branch" ] && [ "$branch" != "$default" ]; then
            url="$base/branches/$branch"
          else
            url="$base"
          fi
          {
            echo "### Developer preview & build output";
            echo "";
            echo "- **HL7 CI preview (build.fhir.org):** $url/  _(rendered by HL7 International's auto-builder; allow a few minutes after push)_";
            echo "- **Reviewable build (this run):** the \`site-${{ steps.meta.outputs.slug }}\` artifact below — a tar.gz of the working + milestone renders.";
            echo "- detected publication mode: **${{ steps.detect.outputs.pubmode }}** (status \`${{ steps.detect.outputs.status }}\`, version \`${{ steps.detect.outputs.version }}\`)";
          } >> "$GITHUB_STEP_SUMMARY"

      # ---- QA regression gate --------------------------------------------------------------------
      # Summarise the render's QA errors to the run summary; on PRs, compare the error count against
      # the base branch's last recorded count and FAIL if the branch adds errors; and upsert a comment
      # on the triggering PR. The baseline is a tiny cached count file, written on branch pushes and
      # restored (keyed by base branch) on PRs — so both sides are the same pipeline and same jar.
      # Runs after the previews so a regressed PR still produces its reviewable artifact.
      - name: Restore base QA baseline (PRs)
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v4
        with:
          path: qa-baseline
          key: qa-baseline-${{ github.repository }}-${{ github.base_ref }}-${{ github.run_id }}
          restore-keys: |
            qa-baseline-${{ github.repository }}-${{ github.base_ref }}-

      - name: Analyse QA, summarise, gate PRs, comment
        if: always() && steps.render.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
          SLUG: ${{ steps.meta.outputs.slug }}
        run: |
          qa="ig-src/output/qa.txt"
          if [ ! -f "$qa" ]; then echo "::warning::no qa.txt at $qa — skipping QA gate"; exit 0; fi
          num() { grep -oE "$1 = [0-9]+" "$qa" | head -1 | grep -oE '[0-9]+' || true; }
          errs=$(num err);   errs=${errs:-0}
          warns=$(num warn); warns=${warns:-0}
          infos=$(num info); infos=${infos:-0}
          grep '^ERROR:' "$qa" | sed -E 's/ \(error message.*//' > qa-errors.txt || true

          base_errs=""
          [ -f qa-baseline/count.txt ] && base_errs=$(tr -cd '0-9' < qa-baseline/count.txt)

          {
            echo "## QA results — \`$SLUG\`"
            echo ""
            echo "| level | count |"
            echo "|---|--:|"
            echo "| ❌ errors | $errs |"
            echo "| ⚠️ warnings | $warns |"
            echo "| ℹ️ info | $infos |"
            if [ -n "$base_errs" ]; then
              d=$((errs - base_errs)); sign=""; [ "$d" -gt 0 ] && sign="+"
              echo ""
              echo "Errors vs base \`$BASE_REF\`: **$base_errs → $errs** (${sign}${d})"
            fi
            if [ "$errs" -gt 0 ]; then
              echo ""; echo "<details><summary>$errs error(s)</summary>"; echo ""
              echo '```'; cat qa-errors.txt; echo '```'; echo ""; echo "</details>"
            fi
          } > qa-summary.md
          cat qa-summary.md >> "$GITHUB_STEP_SUMMARY"

          # PR comment (best-effort; needs pull-requests: write granted by the caller stub)
          if [ "$EVENT" = "pull_request" ] && [ -n "${PR_NUMBER:-}" ]; then
            { printf '<!-- qa-gate -->\n'; cat qa-summary.md; } > qa-comment.md
            node -e 'const fs=require("fs");process.stdout.write(JSON.stringify({body:fs.readFileSync("qa-comment.md","utf8")}))' > qa-payload.json
            api="https://api.github.com/repos/$REPO"
            cid=$(curl -sS -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
              "$api/issues/$PR_NUMBER/comments?per_page=100" \
              | node -e 'const d=JSON.parse(require("fs").readFileSync(0,"utf8")||"[]");const c=(Array.isArray(d)?d:[]).find(x=>x.body&&x.body.includes("<!-- qa-gate -->"));process.stdout.write(c?String(c.id):"")' || true)
            if [ -n "$cid" ]; then
              curl -sS -X PATCH -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
                "$api/issues/comments/$cid" -d @qa-payload.json >/dev/null && echo "updated PR #$PR_NUMBER comment" \
                || echo "::warning::could not update PR comment (grant pull-requests: write in the caller)"
            else
              curl -sS -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
                "$api/issues/$PR_NUMBER/comments" -d @qa-payload.json >/dev/null && echo "posted PR #$PR_NUMBER comment" \
                || echo "::warning::could not post PR comment (grant pull-requests: write in the caller)"
            fi
          fi

          # Record this build's error count as the branch baseline (cached by the save step on pushes).
          mkdir -p qa-baseline
          echo "$errs" > qa-baseline/count.txt
          cp qa-errors.txt qa-baseline/errors.txt 2>/dev/null || true

          # Gate: a PR may not add errors over its base branch.
          if [ "$EVENT" = "pull_request" ] && [ -n "$base_errs" ] && [ "$errs" -gt "$base_errs" ]; then
            echo "::error::QA regression — $errs error(s) vs base \`$BASE_REF\` ($base_errs). Resolve the new errors before merging."
            exit 1
          fi
          echo "QA gate OK — errors=$errs, base=${base_errs:-n/a}"

      - name: Save QA baseline (branch pushes)
        if: github.event_name == 'push' && github.ref_type == 'branch' && steps.render.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: qa-baseline
          key: qa-baseline-${{ github.repository }}-${{ github.ref_name }}-${{ github.run_id }}

  # OUR OWN per-branch S3 previews (previews.hl7.org.au) — RETAINED but OFF by default. The developer
  # preview channel is HL7 International's build.fhir.org (see the build job's report). Re-enable this
  # (enable_s3_preview=true) only when we need to validate our OWN pipeline/publisher output (e.g.
  # testing the dynamic publish-box, the combined jar, or canonical behaviour) rather than the content.
  # Deploys BOTH the working and milestone renders to s3://hl7au-fhir-ig-previews/<slug>/{working,milestone}/.
  preview-s3:
    needs: build
    if: ${{ inputs.enable_s3_preview }}
    runs-on: ubuntu-latest
    steps:
      - name: Download built previews
        uses: actions/download-artifact@v4
        with: { name: "site-${{ needs.build.outputs.slug }}" }
      - name: Checkout history template (its shared root assets — for the preview only)
        uses: actions/checkout@v4
        with: { repository: HL7/fhir-ig-history-template, path: fhir-history }
      - name: Unpack previews + seed history assets + add preview-only redirects
        run: |
          mkdir -p preview && tar -xzf "preview-${{ needs.build.outputs.slug }}.tar.gz" -C preview
          ver="${{ needs.build.outputs.ver }}"
          own="${{ needs.build.outputs.own }}"
          for m in working milestone; do
            d="preview/$m/$own"
            [ -d "$d" ] || continue
            # history.html references shared root assets (assets-hist/, dist-hist/, history.js, *.css …)
            # that the lean build does NOT emit: go-publish's HistoryPageUpdater only copies them on a
            # FIRST publish (delta=false), and these IGs aren't first — prod already has them. So copy
            # them from the history template into the preview (PREVIEW-ONLY; the prod publish artifact
            # stays clean). Without this, preview history.html 404s its CSS/JS and the table won't render.
            cp -a fhir-history/assets-hist fhir-history/dist-hist "$d/" 2>/dev/null || true
            cp -a fhir-history/history.js fhir-history/history-cm.js fhir-history/history.css \
                  fhir-history/fhir.css fhir-history/jquery-ui.css fhir-history/jquery-ui.js \
                  fhir-history/cc0.png "$d/" 2>/dev/null || true
            # Root pages also reference assets/images|css|js = <owned>/assets/ — the CURRENT version's
            # assets, which only a milestone copies up. Copy the built version's own assets up so those
            # resolve (logos fhir-logo-www.png / hl7-logo.png live there). Self-contained — this build.
            if [ -d "$d/$ver/assets" ] && [ ! -d "$d/assets" ]; then
              cp -a "$d/$ver/assets" "$d/assets"
            fi
            # The lean build has no <owned>/index.html (the current-version landing isn't built here).
            # Add a PREVIEW-ONLY redirect per mode so the bare …/<owned>/ URL lands on the new version.
            if [ ! -f "$d/index.html" ]; then
              printf '<!doctype html><meta http-equiv="refresh" content="0; url=%s/index.html"><a href="%s/index.html">%s</a>\n' \
                "$ver" "$ver" "$ver" > "$d/index.html"
            fi
          done
      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy previews to S3 (previews bucket)
        run: |
          # The preview is two full IG sites (working + milestone ≈ 10k+ mostly-small files); the
          # default aws-cli s3 concurrency of 10 makes this request-rate bound (~12 min). Raise the
          # transfer concurrency so the many small PUTs parallelise (≈12 min → a few min).
          aws configure set default.s3.max_concurrent_requests 64
          aws configure set default.s3.max_queue_size 10000
          # Per-branch preview at s3://<previews-bucket>/<slug>/{working,milestone}/...
          # --delete is scoped to THIS slug's prefix only, so each branch's preview is self-clean and
          # other branches are untouched. Stale branch previews auto-expire via the lifecycle rule.
          aws s3 sync ./preview "s3://$PREVIEWS_BUCKET/${{ needs.build.outputs.slug }}/" \
            --delete --only-show-errors
      - name: Report preview URLs
        run: |
          slug="${{ needs.build.outputs.slug }}"
          ver="${{ needs.build.outputs.ver }}"
          own="${{ needs.build.outputs.own }}"
          s3base="http://$PREVIEWS_BUCKET.s3-website-$AWS_REGION.amazonaws.com/$slug"
          dnsbase="https://previews.hl7.org.au/$slug"
          {
            echo "### Previews (S3 — previews bucket)";
            echo "| mode | new version | directory of versions |";
            echo "|------|-------------|------------------------|";
            echo "| **working** | $s3base/working/$own/$ver/index.html | $s3base/working/$own/history.html |";
            echo "| **milestone** | $s3base/milestone/$own/$ver/index.html | $s3base/milestone/$own/history.html |";
            echo "";
            echo "_Working = the new version as a non-current preview. Milestone = the same version promoted to";
            echo "current (publish box reads 'this is the current version'; old versions untouched via dynamic-publish-box)._";
            echo "_Primary links use the S3 website endpoint. Once the previews.hl7.org.au DNS is in use,";
            echo "the same paths resolve under \`$dnsbase/working/$own/$ver/index.html\`._";
          } >> "$GITHUB_STEP_SUMMARY"

  # DEPLOY TO PREPROD on a GitHub release — the staging/validation environment before a prod release.
  # A release targets the publication/release BRANCH (never merged to master); publishing the release
  # is the staging act. Also runs on an explicit dispatch with deploy_preprod=true (+ ref=<branch>) so a
  # BRANCH build can be staged BEFORE cutting the release — unlike the previews channel, preprod sits
  # behind the real CloudFront distribution (canonical/redirect functions), so pages like qa.html and
  # the publish box behave exactly as they will on prod. UNGATED (preprod is not prod). Deploys the
  # AUTO-DETECTED mode (milestone vs working, from publication-request.json `status`): a
  # release/trial-use status lands as the candidate 'current' so preprod shows exactly what prod will
  # look like; a draft/ballot/preview/ci-build status lands as a non-current versioned snapshot. Same
  # additive owned-subtree + shared-root-files model as prod, but to the mirror bucket. preprod mirrors
  # prod, so seeding the lean -web from live prod (in the build job) is correct here too. CloudFront
  # (CachingOptimized) is invalidated so the change shows promptly. Prod promotion is a separate manual
  # step (promote-prod.yml) that copies this approved preprod content to prod.
  deploy-preprod:
    needs: build
    if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.deploy_preprod) }}
    runs-on: ubuntu-latest
    steps:
      - name: Download built site
        uses: actions/download-artifact@v4
        with: { name: "site-${{ needs.build.outputs.slug }}" }
      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy detected mode to preprod S3 (mirror bucket; additive)
        run: |
          aws configure set default.s3.max_concurrent_requests 64
          aws configure set default.s3.max_queue_size 10000
          own="${{ needs.build.outputs.own }}"; sub="${{ inputs.subtree }}"
          m="${{ needs.build.outputs.pubmode }}"   # milestone | working (auto-detected from status)
          echo "Deploying '$m' build to preprod (status=${{ needs.build.outputs.status }}, version=${{ needs.build.outputs.version }})"
          mkdir -p out && tar -xzf "preview-${{ needs.build.outputs.slug }}.tar.gz" -C out
          test -d "out/$m/$own" || { echo "::error::'$m' build missing in artifact — not deploying to preprod"; exit 1; }
          aws s3 sync "out/$m/$own" "s3://$PREPROD_BUCKET/$own" --only-show-errors
          if [ -n "$sub" ]; then
            aws s3 cp out/$m/fhir/package-feed.xml      "s3://$PREPROD_BUCKET/fhir/package-feed.xml"      --only-show-errors
            aws s3 cp out/$m/fhir/publication-feed.xml  "s3://$PREPROD_BUCKET/fhir/publication-feed.xml"  --only-show-errors
          fi
          [ -f out/$m/package-registry.json ] && aws s3 cp out/$m/package-registry.json "s3://$PREPROD_BUCKET/package-registry.json" --only-show-errors || true
      - name: Invalidate preprod CloudFront
        run: aws cloudfront create-invalidation --distribution-id "$PREPROD_DIST" --paths "/*" >/dev/null
      - name: Report preprod URL
        run: |
          own="${{ needs.build.outputs.own }}"; ver="${{ needs.build.outputs.ver }}"
          {
            echo "### Deployed to preprod (staging)";
            echo "- mode: **${{ needs.build.outputs.pubmode }}** (status \`${{ needs.build.outputs.status }}\`, version \`${{ needs.build.outputs.version }}\`)";
            echo "- https://preprod.hl7.org.au/$own/$ver/index.html";
            echo "- directory of versions: https://preprod.hl7.org.au/$own/history.html";
            if [ "${{ github.ref_type }}" = "tag" ] && [ "${{ needs.build.outputs.tag_version_ok }}" != "true" ]; then
              echo "- ⚠️ **tag/version mismatch:** release tag \`${{ github.ref_name }}\` does not match publication-request version \`${{ needs.build.outputs.version }}\`. Confirm the release targets the intended commit BEFORE promoting to prod.";
            fi
            echo "_Validate here, then promote to prod from the **publications** repo: Actions → \"Promote preprod → prod\" (ig=\`${{ github.event.repository.name }}\`, version=\`${{ needs.build.outputs.version }}\`), which waits for a production-environment approval._";
          } >> "$GITHUB_STEP_SUMMARY"
